server:
  port: 9292
spring:
  application:
    name: Content-Data-Service
  datasource:
    url: jdbc:mysql://localhost:3306/session
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect